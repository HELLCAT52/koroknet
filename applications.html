<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Мои заявки - Корочки.есть</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <img src="images/image01.webp" alt="Корочки.есть" class="logo-img">
                <h1>Корочки.есть</h1>
            </div>
            <div class="user-info">
                <span id="userName"></span>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </header>

        <nav class="nav-menu">
            <a href="applications.html" class="nav-link active">Мои заявки</a>
            <a href="create-application.html" class="nav-link">Новая заявка</a>
        </nav>

        <div class="content">
            <div class="applications-header">
                <h2>Мои заявки на обучение</h2>
                <button class="btn-refresh" onclick="loadApplications()">⟳ Обновить</button>
            </div>

            <div id="applicationsList" class="applications-list">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
    </div>

    <!-- Модальное окно для отзыва -->
    <div id="reviewModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('reviewModal')">&times;</span>
            <h3>Оставить отзыв</h3>
            <form id="reviewForm">
                <input type="hidden" id="reviewApplicationId">
                <div class="form-group">
                    <label for="rating">Оценка</label>
                    <div class="rating-stars">
                        <span class="star" data-rating="1">★</span>
                        <span class="star" data-rating="2">★</span>
                        <span class="star" data-rating="3">★</span>
                        <span class="star" data-rating="4">★</span>
                        <span class="star" data-rating="5">★</span>
                    </div>
                    <input type="hidden" id="rating" value="5">
                </div>
                <div class="form-group">
                    <label for="reviewContent">Ваш отзыв</label>
                    <textarea id="reviewContent" rows="5" required placeholder="Поделитесь впечатлениями о курсе..."></textarea>
                </div>
                <button type="submit" class="btn-submit">Отправить отзыв</button>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        let currentApplications = [];

        // Проверка авторизации
        if (!sessionStorage.getItem('user_id')) {
            window.location.href = 'login.html';
        }

        document.getElementById('userName').textContent = `Привет, ${sessionStorage.getItem('full_name') || sessionStorage.getItem('username')}!`;

        // Загрузка заявок
        async function loadApplications() {
            const userId = sessionStorage.getItem('user_id');
            
            try {
                const result = await apiRequest(`api/applications.php?user_id=${userId}`, 'GET');
                
                if (result.success) {
                    currentApplications = result.data;
                    renderApplications(result.data);
                } else {
                    showNotification('Ошибка загрузки заявок', 'error');
                }
            } catch (error) {
                showNotification('Ошибка подключения', 'error');
            }
        }

        // Отображение заявок
        function renderApplications(applications) {
            const container = document.getElementById('applicationsList');
            
            if (!applications || applications.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📋</div>
                        <p>У вас пока нет заявок</p>
                        <a href="create-application.html" class="btn-primary">Создать заявку</a>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = applications.map(app => `
                <div class="application-card fade-in">
                    <div class="application-header">
                        <h3>${escapeHtml(app.course_name)}</h3>
                        <span class="status-badge status-${app.status}">
                            ${getStatusText(app.status)}
                        </span>
                    </div>
                    <div class="application-details">
                        <p><strong>Дата начала:</strong> ${formatDate(app.start_date)}</p>
                        <p><strong>Способ оплаты:</strong> ${getPaymentMethodText(app.payment_method)}</p>
                        <p><strong>Дата подачи:</strong> ${formatDateTime(app.created_at)}</p>
                    </div>
                    <div class="application-actions">
                        ${app.status === 'completed' ? `
                            <button class="btn-review" onclick="openReviewModal(${app.id})">
                                ✍️ Оставить отзыв
                            </button>
                        ` : ''}
                        ${app.review ? `
                            <div class="review-info">
                                <strong>Ваш отзыв:</strong> ${escapeHtml(app.review)}
                            </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        // Открытие модального окна отзыва
        function openReviewModal(applicationId) {
            const application = currentApplications.find(app => app.id === applicationId);
            if (application && application.status === 'completed') {
                document.getElementById('reviewApplicationId').value = applicationId;
                openModal('reviewModal');
            }
        }

        // Отправка отзыва
        document.getElementById('reviewForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const applicationId = document.getElementById('reviewApplicationId').value;
            const rating = document.getElementById('rating').value;
            const content = document.getElementById('reviewContent').value;
            
            if (!content.trim()) {
                showNotification('Пожалуйста, напишите отзыв', 'error');
                return;
            }
            
            try {
                const result = await apiRequest('api/reviews.php', 'POST', {
                    application_id: applicationId,
                    rating: rating,
                    content: content
                });
                
                if (result.success) {
                    showNotification('Спасибо за отзыв!', 'success');
                    closeModal('reviewModal');
                    document.getElementById('reviewContent').value = '';
                    loadApplications(); // Обновляем список заявок
                } else {
                    showNotification(result.message || 'Ошибка при отправке отзыва', 'error');
                }
            } catch (error) {
                showNotification('Ошибка подключения', 'error');
            }
        });

        // Звездочки рейтинга
        document.querySelectorAll('.star').forEach(star => {
            star.addEventListener('click', function() {
                const rating = this.getAttribute('data-rating');
                document.getElementById('rating').value = rating;
                
                document.querySelectorAll('.star').forEach(s => {
                    if (s.getAttribute('data-rating') <= rating) {
                        s.classList.add('active');
                    } else {
                        s.classList.remove('active');
                    }
                });
            });
        });

        // Загрузка при открытии страницы
        loadApplications();
    </script>
</body>
</html>
