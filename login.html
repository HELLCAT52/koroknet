<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Вход - Корочки.есть</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <img src="images/image01.webp" alt="Корочки.есть" class="logo-img">
                <h1>Корочки.есть</h1>
            </div>
            <p class="tagline">Вход в личный кабинет</p>
        </header>

        <div class="form-container">
            <h2>Авторизация</h2>
            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="username">Логин</label>
                    <input type="text" id="username" name="username" autocomplete="username" required>
                    <div class="error-message" id="usernameError">Введите логин</div>
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" autocomplete="current-password" required>
                    <div class="error-message" id="passwordError">Введите пароль</div>
                </div>

                <button class="btn-submit" type="submit">Войти</button>
            </form>

            <p style="margin-top:14px;" class="text-muted">
                Нет аккаунта? <a href="register.html">Зарегистрируйтесь</a>
            </p>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        if (sessionStorage.getItem('user_id')) {
            window.location.href = sessionStorage.getItem('user_role') === 'admin' ? 'admin.html' : 'applications.html';
        }

        const loginForm = document.getElementById('loginForm');

        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            clearFieldErrors(loginForm);

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const localErrors = {};

            if (!username) {
                localErrors.username = 'Введите логин';
            }

            if (!password) {
                localErrors.password = 'Введите пароль';
            }

            if (Object.keys(localErrors).length > 0) {
                applyFieldErrors(loginForm, localErrors);
                return;
            }

            const submitButton = loginForm.querySelector('button[type="submit"]');
            submitButton.disabled = true;
            submitButton.textContent = 'Входим...';

            try {
                const result = await apiRequest('api/login.php', 'POST', { username, password });

                sessionStorage.setItem('user_id', String(result.user_id));
                sessionStorage.setItem('username', result.username);
                sessionStorage.setItem('full_name', result.full_name || '');
                sessionStorage.setItem('user_role', result.role || 'user');

                showNotification('Вход выполнен успешно');
                setTimeout(() => {
                    window.location.href = result.role === 'admin' ? 'admin.html' : 'applications.html';
                }, 600);
            } catch (error) {
                if (error.payload?.field_errors) {
                    applyFieldErrors(loginForm, error.payload.field_errors);
                }
                showNotification(error.payload?.message || 'Не удалось выполнить вход', 'error');
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = 'Войти';
            }
        });
    </script>
</body>
</html>
