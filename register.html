<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Регистрация - Корочки.есть</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <img src="images/image01.webp" alt="Корочки.есть" class="logo-img">
                <h1>Корочки.есть</h1>
            </div>
            <p class="tagline">Создание аккаунта пользователя</p>
        </header>

        <div class="form-container">
            <h2>Регистрация</h2>
            <form id="registerForm" novalidate>
                <div class="form-group">
                    <label for="username">Логин</label>
                    <input type="text" id="username" name="username" required>
                    <div class="error-message" id="usernameError">Логин должен содержать минимум 6 символов</div>
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" required>
                    <div class="error-message" id="passwordError">Минимум 8 символов</div>
                </div>

                <div class="form-group">
                    <label for="full_name">ФИО</label>
                    <input type="text" id="full_name" name="full_name" required>
                    <div class="error-message" id="full_nameError">Введите корректное ФИО</div>
                </div>

                <div class="form-group">
                    <label for="phone">Телефон</label>
                    <input type="tel" id="phone" name="phone" placeholder="8(XXX)XXX-XX-XX" required>
                    <div class="error-message" id="phoneError">Телефон должен быть в формате 8(XXX)XXX-XX-XX</div>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                    <div class="error-message" id="emailError">Введите корректный email</div>
                </div>

                <button class="btn-submit" type="submit">Зарегистрироваться</button>
            </form>

            <p style="margin-top:14px;" class="text-muted">
                Уже есть аккаунт? <a href="login.html">Войти</a>
            </p>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        const registerForm = document.getElementById('registerForm');

        registerForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            clearFieldErrors(registerForm);

            const data = {
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value,
                full_name: document.getElementById('full_name').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                email: document.getElementById('email').value.trim()
            };

            const errors = {};
            if (!FormValidator.validateLogin(data.username)) {
                errors.username = 'Логин: минимум 6 символов (латиница, цифры, .-_ )';
            }
            if (!FormValidator.validatePassword(data.password)) {
                errors.password = 'Пароль должен содержать минимум 8 символов';
            }
            if (!FormValidator.validateFullName(data.full_name)) {
                errors.full_name = 'ФИО может содержать только буквы, пробелы и дефис';
            }
            if (!FormValidator.validatePhone(data.phone)) {
                errors.phone = 'Телефон должен быть в формате 8(XXX)XXX-XX-XX';
            }
            if (!FormValidator.validateEmail(data.email)) {
                errors.email = 'Введите корректный email';
            }

            if (Object.keys(errors).length > 0) {
                applyFieldErrors(registerForm, errors);
                return;
            }

            const submitButton = registerForm.querySelector('button[type="submit"]');
            submitButton.disabled = true;
            submitButton.textContent = 'Регистрация...';

            try {
                const result = await apiRequest('api/register.php', 'POST', data);
                showNotification(result.message || 'Регистрация прошла успешно');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 900);
            } catch (error) {
                if (error.payload?.field_errors) {
                    applyFieldErrors(registerForm, error.payload.field_errors);
                }
                showNotification(error.payload?.message || 'Не удалось зарегистрироваться', 'error');
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = 'Зарегистрироваться';
            }
        });
    </script>
</body>
</html>
