<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Отзывы - Корочки.есть</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <img src="images/image01.webp" alt="Корочки.есть" class="logo-img">
                <h1>Корочки.есть</h1>
            </div>
            <p class="tagline">Опубликованные отзывы пользователей</p>
            <div class="user-info" id="userInfo" style="display:none;">
                <span id="userName"></span>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </header>

        <nav class="nav-menu">
            <a class="nav-link" href="index.html">Главная</a>
            <a class="nav-link active" href="reviews.html">Отзывы</a>
            <a class="nav-link" id="cabinetLink" href="applications.html" style="display:none;">Личный кабинет</a>
            <a class="nav-link" id="adminLink" href="admin.html" style="display:none;">Админка</a>
            <a class="nav-link" id="loginLink" href="login.html">Вход</a>
            <a class="nav-link" id="registerLink" href="register.html">Регистрация</a>
        </nav>

        <section class="content">
            <div class="section-header">
                <h2>Все отзывы</h2>
                <button class="btn-refresh" type="button" onclick="loadReviews()">Обновить</button>
            </div>
            <div id="reviewsList" class="review-grid">
                <div class="loading">Загрузка...</div>
            </div>
        </section>
    </div>

    <script src="js/main.js"></script>
    <script>
        async function loadReviews() {
            const list = document.getElementById('reviewsList');
            list.innerHTML = '<div class="loading">Загрузка...</div>';

            try {
                const result = await apiRequest('api/reviews.php', 'GET');
                const reviews = result.data || [];

                if (!reviews.length) {
                    list.innerHTML = '<div class="empty-state">Пока нет опубликованных отзывов.</div>';
                    return;
                }

                list.innerHTML = reviews.map((review) => {
                    const score = Math.max(1, Math.min(5, Number(review.rating) || 0));
                    return `
                        <article class="review-card">
                            <h3>${escapeHtml(review.course_name)}</h3>
                            <p class="review-rating">Оценка: ${'★'.repeat(score)} (${score}/5)</p>
                            <p>${escapeHtml(review.content)}</p>
                            <p class="text-muted">Автор: ${escapeHtml(review.full_name)}</p>
                            <p class="text-muted">Дата публикации: ${formatDateTime(review.created_at)}</p>
                        </article>
                    `;
                }).join('');
            } catch (error) {
                list.innerHTML = '<div class="empty-state">Не удалось загрузить отзывы.</div>';
            }
        }

        function initSessionNavigation() {
            const userId = sessionStorage.getItem('user_id');
            const role = sessionStorage.getItem('user_role');

            if (!userId) {
                return;
            }

            document.getElementById('loginLink').style.display = 'none';
            document.getElementById('registerLink').style.display = 'none';
            document.getElementById('cabinetLink').style.display = role === 'admin' ? 'none' : 'inline-flex';
            document.getElementById('adminLink').style.display = role === 'admin' ? 'inline-flex' : 'none';

            const userInfo = document.getElementById('userInfo');
            userInfo.style.display = 'flex';
            document.getElementById('userName').textContent = `Пользователь: ${sessionStorage.getItem('full_name') || sessionStorage.getItem('username')}`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            initSessionNavigation();
            loadReviews();
        });
    </script>
</body>
</html>
