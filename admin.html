<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Панель администратора - Корочки.есть</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header admin-header">
            <div class="logo">
                <img src="images/image01.webp" alt="Корочки.есть" class="logo-img">
                <h1>Корочки.есть</h1>
            </div>
            <div class="user-info">
                <span>Администратор</span>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </header>

        <div class="admin-panel">
            <div class="admin-stats" id="stats">
                <div class="stat-card">
                    <div class="stat-value" id="totalCount">0</div>
                    <div class="stat-label">Всего заявок</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="newCount">0</div>
                    <div class="stat-label">Новые</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="progressCount">0</div>
                    <div class="stat-label">В обучении</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="completedCount">0</div>
                    <div class="stat-label">Завершены</div>
                </div>
            </div>

            <div class="admin-filters">
                <input type="text" id="searchInput" placeholder="Поиск по ФИО или курсу..." class="search-input">
                <select id="statusFilter" class="filter-select">
                    <option value="all">Все статусы</option>
                    <option value="new">Новые</option>
                    <option value="in_progress">Идет обучение</option>
                    <option value="completed">Обучение завершено</option>
                </select>
            </div>

            <div class="table-container">
                <table id="applicationsTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Пользователь</th>
                            <th>Курс</th>
                            <th>Дата начала</th>
                            <th>Способ оплаты</th>
                            <th>Статус</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="applicationsTableBody">
                        <tr><td colspan="7" style="text-align: center;">Загрузка...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        let allApplications = [];
        let currentPage = 1;
        const itemsPerPage = 10;

        // Проверка прав администратора
        if (!sessionStorage.getItem('user_id') || sessionStorage.getItem('user_role') !== 'admin') {
            window.location.href = 'login.html';
        }

        // Загрузка всех заявок
        async function loadApplications() {
            try {
                const result = await apiRequest('api/admin/applications.php', 'GET');
                
                if (result.success) {
                    allApplications = result.data;
                    updateStats();
                    filterAndRender();
                } else {
                    showNotification('Ошибка загрузки заявок', 'error');
                }
            } catch (error) {
                showNotification('Ошибка подключения к серверу', 'error');
            }
        }

        // Обновление статистики
        function updateStats() {
            const total = allApplications.length;
            const newCount = allApplications.filter(app => app.status === 'new').length;
            const progressCount = allApplications.filter(app => app.status === 'in_progress').length;
            const completedCount = allApplications.filter(app => app.status === 'completed').length;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('newCount').textContent = newCount;
            document.getElementById('progressCount').textContent = progressCount;
            document.getElementById('completedCount').textContent = completedCount;
        }

        // Фильтрация и отображение
        function filterAndRender() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;
            
            let filtered = allApplications;
            
            // Фильтр по статусу
            if (statusFilter !== 'all') {
                filtered = filtered.filter(app => app.status === statusFilter);
            }
            
            // Поиск по ФИО и курсу
            if (searchTerm) {
                filtered = filtered.filter(app => 
                    app.full_name.toLowerCase().includes(searchTerm) ||
                    app.course_name.toLowerCase().includes(searchTerm)
                );
            }
            
            renderTable(filtered);
        }

        // Отображение таблицы с пагинацией
        function renderTable(applications) {
            const tbody = document.getElementById('applicationsTableBody');
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = applications.slice(start, end);
            
            if (pageItems.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">Нет заявок</td></tr>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            tbody.innerHTML = pageItems.map(app => `
                <tr class="fade-in">
                    <td>${app.id}</td>
                    <td>${escapeHtml(app.full_name)}<br><small>${escapeHtml(app.username)}</small></td>
                    <td>${escapeHtml(app.course_name)}</td>
                    <td>${formatDate(app.start_date)}</td>
                    <td>${getPaymentMethodText(app.payment_method)}</td>
                    <td>
                        <select class="status-select status-${app.status}" 
                                onchange="updateStatus(${app.id}, this.value)">
                            <option value="new" ${app.status === 'new' ? 'selected' : ''}>Новая</option>
                            <option value="in_progress" ${app.status === 'in_progress' ? 'selected' : ''}>Идет обучение</option>
                            <option value="completed" ${app.status === 'completed' ? 'selected' : ''}>Обучение завершено</option>
                        </select>
                    </td>
                    <td>
                        <button class="btn-view" onclick="viewApplicationDetails(${app.id})">Просмотр</button>
                    </td>
                </tr>
            `).join('');
            
            // Пагинация
            const totalPages = Math.ceil(applications.length / itemsPerPage);
            renderPagination(totalPages);
        }

        // Отображение пагинации
        function renderPagination(totalPages) {
            const paginationDiv = document.getElementById('pagination');
            if (totalPages <= 1) {
                paginationDiv.innerHTML = '';
                return;
            }
            
            let html = '<div class="pagination-controls">';
            html += `<button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>«</button>`;
            
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += '<span class="page-dots">...</span>';
                }
            }
            
            html += `<button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>»</button>`;
            html += '</div>';
            
            paginationDiv.innerHTML = html;
        }

        function changePage(page) {
            currentPage = page;
            filterAndRender();
        }

        // Обновление статуса
        async function updateStatus(applicationId, newStatus) {
            try {
                const result = await apiRequest('api/admin/applications.php', 'PUT', {
                    id: applicationId,
                    status: newStatus
                });
                
                if (result.success) {
                    showNotification('Статус заявки обновлен', 'success');
                    loadApplications(); // Перезагружаем список
                } else {
                    showNotification('Ошибка при обновлении статуса', 'error');
                }
            } catch (error) {
                showNotification('Ошибка подключения', 'error');
            }
        }

        // Просмотр деталей заявки
        function viewApplicationDetails(applicationId) {
            const app = allApplications.find(a => a.id === applicationId);
            if (app) {
                showNotification(`Заявка #${app.id}: ${app.course_name} - ${app.full_name}`, 'info');
            }
        }

        // События фильтров
        document.getElementById('searchInput').addEventListener('input', () => {
            currentPage = 1;
            filterAndRender();
        });
        
        document.getElementById('statusFilter').addEventListener('change', () => {
            currentPage = 1;
            filterAndRender();
        });

        // Загрузка при открытии
        loadApplications();
    </script>
</body>
</html>
