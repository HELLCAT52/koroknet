<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Админ-панель - Корочки.есть</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <img src="images/image01.webp" alt="Корочки.есть" class="logo-img">
                <h1>Корочки.есть</h1>
            </div>
            <div class="user-info">
                <span>Роль: администратор</span>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </header>

        <nav class="nav-menu">
            <a href="index.html" class="nav-link">Главная</a>
            <a href="admin.html" class="nav-link active">Админка</a>
            <a href="reviews.html" class="nav-link">Отзывы</a>
        </nav>

        <div class="admin-panel">
            <div class="tabs">
                <button type="button" class="tab-btn active" data-tab="applicationsTab">Заявки</button>
                <button type="button" class="tab-btn" data-tab="reviewsTab">Модерация отзывов</button>
                <button type="button" class="tab-btn" data-tab="coursesTab">Курсы</button>
            </div>

            <section id="applicationsTab" class="tab-panel active">
                <div class="admin-stats" id="stats">
                    <article class="stat-card"><div class="stat-value" id="totalCount">0</div><div class="stat-label">Всего</div></article>
                    <article class="stat-card"><div class="stat-value" id="newCount">0</div><div class="stat-label">Новые</div></article>
                    <article class="stat-card"><div class="stat-value" id="progressCount">0</div><div class="stat-label">В обучении</div></article>
                    <article class="stat-card"><div class="stat-value" id="completedCount">0</div><div class="stat-label">Завершены</div></article>
                </div>

                <div class="admin-filters">
                    <input id="searchInput" class="search-input" type="text" placeholder="Поиск по ФИО или курсу">
                    <select id="statusFilter" class="filter-select">
                        <option value="all">Все статусы</option>
                        <option value="new">Новые</option>
                        <option value="in_progress">Идет обучение</option>
                        <option value="completed">Завершено</option>
                    </select>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Пользователь</th>
                                <th>Курс</th>
                                <th>Начало</th>
                                <th>Создана</th>
                                <th>Оплата</th>
                                <th>Статус</th>
                            </tr>
                        </thead>
                        <tbody id="applicationsTableBody">
                            <tr><td colspan="7">Загрузка...</td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="pagination" id="pagination"></div>
            </section>

            <section id="reviewsTab" class="tab-panel">
                <div class="section-header">
                    <h2>Отзывы на модерации</h2>
                    <button type="button" class="btn-refresh" onclick="loadPendingReviews()">Обновить</button>
                </div>
                <div id="pendingReviews" class="admin-review-list">
                    <div class="loading">Загрузка...</div>
                </div>
            </section>

            <section id="coursesTab" class="tab-panel">
                <div class="section-header">
                    <h2>Добавление нового курса</h2>
                </div>
                <form id="courseForm" novalidate>
                    <div class="form-group">
                        <label for="courseName">Название курса</label>
                        <input id="courseName" name="name" type="text" required>
                        <div id="nameError" class="error-message">Введите название курса</div>
                    </div>
                    <div class="form-group">
                        <label for="courseDescription">Описание</label>
                        <textarea id="courseDescription" name="description" required></textarea>
                        <div id="descriptionError" class="error-message">Введите описание курса</div>
                    </div>
                    <button type="submit" class="btn-submit">Добавить курс</button>
                </form>

                <div class="section-header" style="margin-top:16px;">
                    <h3>Текущие курсы</h3>
                    <button type="button" class="btn-refresh" onclick="loadCourses()">Обновить</button>
                </div>
                <div id="coursesList" class="course-admin-list"></div>
            </section>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        if (sessionStorage.getItem('user_role') !== 'admin') {
            window.location.href = 'login.html';
        }

        let allApplications = [];
        let filteredApplications = [];
        let currentPage = 1;
        const pageSize = 10;

        function initTabs() {
            document.querySelectorAll('.tab-btn').forEach((button) => {
                button.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach((btn) => btn.classList.remove('active'));
                    document.querySelectorAll('.tab-panel').forEach((panel) => panel.classList.remove('active'));

                    button.classList.add('active');
                    document.getElementById(button.dataset.tab).classList.add('active');
                });
            });
        }

        function updateStats() {
            document.getElementById('totalCount').textContent = allApplications.length;
            document.getElementById('newCount').textContent = allApplications.filter((item) => item.status === 'new').length;
            document.getElementById('progressCount').textContent = allApplications.filter((item) => item.status === 'in_progress').length;
            document.getElementById('completedCount').textContent = allApplications.filter((item) => item.status === 'completed').length;
        }

        function applyFilters() {
            const search = document.getElementById('searchInput').value.trim().toLowerCase();
            const status = document.getElementById('statusFilter').value;

            filteredApplications = allApplications.filter((item) => {
                const matchesStatus = status === 'all' || item.status === status;
                const haystack = `${item.full_name || ''} ${item.course_name || ''}`.toLowerCase();
                const matchesSearch = !search || haystack.includes(search);
                return matchesStatus && matchesSearch;
            });

            currentPage = 1;
            renderApplicationsTable();
        }

        function renderApplicationsTable() {
            const tbody = document.getElementById('applicationsTableBody');

            if (!filteredApplications.length) {
                tbody.innerHTML = '<tr><td colspan="7">Заявки не найдены</td></tr>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            const start = (currentPage - 1) * pageSize;
            const pageItems = filteredApplications.slice(start, start + pageSize);

            tbody.innerHTML = pageItems.map((app) => `
                <tr>
                    <td>${Number(app.id)}</td>
                    <td><strong>${escapeHtml(app.full_name)}</strong><br><span class="text-muted">${escapeHtml(app.username)}</span></td>
                    <td>${escapeHtml(app.course_name)}</td>
                    <td>${escapeHtml(app.start_date_formatted || formatDate(app.start_date))}</td>
                    <td>${escapeHtml(app.created_at_formatted || formatDateTime(app.created_at))}</td>
                    <td>${escapeHtml(getPaymentMethodText(app.payment_method))}</td>
                    <td>
                        <select class="status-select" onchange="updateStatus(${Number(app.id)}, this.value)">
                            <option value="new" ${app.status === 'new' ? 'selected' : ''}>Новая</option>
                            <option value="in_progress" ${app.status === 'in_progress' ? 'selected' : ''}>Идет обучение</option>
                            <option value="completed" ${app.status === 'completed' ? 'selected' : ''}>Завершено</option>
                        </select>
                    </td>
                </tr>
            `).join('');

            renderPagination();
        }

        function renderPagination() {
            const pageCount = Math.ceil(filteredApplications.length / pageSize);
            const root = document.getElementById('pagination');

            if (pageCount <= 1) {
                root.innerHTML = '';
                return;
            }

            let html = '<div class="pagination-controls">';
            html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})">‹</button>`;
            for (let i = 1; i <= pageCount; i += 1) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
            }
            html += `<button class="page-btn" ${currentPage === pageCount ? 'disabled' : ''} onclick="changePage(${currentPage + 1})">›</button>`;
            html += '</div>';

            root.innerHTML = html;
        }

        async function changePage(page) {
            const pageCount = Math.ceil(filteredApplications.length / pageSize);
            if (page < 1 || page > pageCount) {
                return;
            }
            currentPage = page;
            renderApplicationsTable();
        }

        async function loadApplications() {
            const result = await apiRequest('api/admin/applications.php', 'GET');
            allApplications = result.data || [];
            filteredApplications = [...allApplications];
            updateStats();
            renderApplicationsTable();
        }

        async function updateStatus(id, status) {
            try {
                await apiRequest('api/admin/applications.php', 'PUT', { id, status });
                showNotification('Статус обновлен');
                await loadApplications();
                applyFilters();
            } catch (error) {
                showNotification(error.payload?.message || 'Не удалось обновить статус', 'error');
            }
        }

        async function loadPendingReviews() {
            const container = document.getElementById('pendingReviews');
            container.innerHTML = '<div class="loading">Загрузка...</div>';

            try {
                const result = await apiRequest('api/reviews.php?scope=pending', 'GET');
                const reviews = result.data || [];

                if (!reviews.length) {
                    container.innerHTML = '<div class="empty-state">Нет отзывов на модерации.</div>';
                    return;
                }

                container.innerHTML = reviews.map((review) => `
                    <article class="admin-review-card">
                        <div class="section-header">
                            <h3>${escapeHtml(review.course_name)}</h3>
                            <span class="review-status-badge review-status-pending">На модерации</span>
                        </div>
                        <p><strong>Пользователь:</strong> ${escapeHtml(review.full_name)} (${escapeHtml(review.username)})</p>
                        <p><strong>Оценка:</strong> ${Number(review.rating) || 0}/5</p>
                        <p>${escapeHtml(review.content)}</p>
                        <p class="text-muted">Отправлен: ${formatDateTime(review.created_at)}</p>
                        <div class="application-actions">
                            <button type="button" class="btn-approve" onclick="moderateReview(${Number(review.id)}, 'approved')">Опубликовать</button>
                            <button type="button" class="btn-reject" onclick="moderateReview(${Number(review.id)}, 'rejected')">Отклонить</button>
                        </div>
                    </article>
                `).join('');
            } catch (error) {
                container.innerHTML = '<div class="empty-state">Не удалось загрузить отзывы.</div>';
            }
        }

        async function moderateReview(reviewId, status) {
            try {
                await apiRequest('api/reviews.php', 'PUT', {
                    review_id: reviewId,
                    status,
                    moderation_note: status === 'rejected' ? 'Пожалуйста, уточните детали обучения и отправьте отзыв повторно.' : ''
                });

                showNotification(status === 'approved' ? 'Отзыв опубликован' : 'Публикация отзыва отклонена');
                await loadPendingReviews();
            } catch (error) {
                showNotification(error.payload?.message || 'Не удалось обработать отзыв', 'error');
            }
        }

        async function loadCourses() {
            const container = document.getElementById('coursesList');
            container.innerHTML = '<div class="loading">Загрузка...</div>';

            try {
                const result = await apiRequest('api/admin/courses.php', 'GET');
                const courses = result.data || [];

                if (!courses.length) {
                    container.innerHTML = '<div class="empty-state">Курсы пока не добавлены.</div>';
                    return;
                }

                container.innerHTML = courses.map((course) => `
                    <article class="course-admin-card">
                        <h3>${escapeHtml(course.name)}</h3>
                        <p>${escapeHtml(course.description || 'Описание отсутствует')}</p>
                    </article>
                `).join('');
            } catch (error) {
                container.innerHTML = '<div class="empty-state">Не удалось загрузить курсы.</div>';
            }
        }

        document.getElementById('courseForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const form = event.currentTarget;
            clearFieldErrors(form);

            const payload = {
                name: document.getElementById('courseName').value.trim(),
                description: document.getElementById('courseDescription').value.trim()
            };

            const localErrors = {};
            if (payload.name.length < 3) {
                localErrors.name = 'Название курса должно содержать минимум 3 символа';
            }
            if (payload.description.length < 10) {
                localErrors.description = 'Описание курса должно содержать минимум 10 символов';
            }

            if (Object.keys(localErrors).length > 0) {
                applyFieldErrors(form, localErrors);
                return;
            }

            const submitButton = form.querySelector('button[type="submit"]');
            submitButton.disabled = true;
            submitButton.textContent = 'Добавление...';

            try {
                const response = await apiRequest('api/admin/courses.php', 'POST', payload);
                showNotification(response.message || 'Курс добавлен');
                form.reset();
                await loadCourses();
            } catch (error) {
                if (error.payload?.field_errors) {
                    applyFieldErrors(form, error.payload.field_errors);
                }
                showNotification(error.payload?.message || 'Не удалось добавить курс', 'error');
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = 'Добавить курс';
            }
        });

        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('statusFilter').addEventListener('change', applyFilters);

        document.addEventListener('DOMContentLoaded', async () => {
            initTabs();
            try {
                await Promise.all([loadApplications(), loadPendingReviews(), loadCourses()]);
            } catch (error) {
                showNotification('Не удалось загрузить данные админки', 'error');
            }
        });

        window.updateStatus = updateStatus;
        window.changePage = changePage;
        window.moderateReview = moderateReview;
        window.loadPendingReviews = loadPendingReviews;
        window.loadCourses = loadCourses;
    </script>
</body>
</html>
